name: CI/CD - gossip-writer image

on:
  push:
    branches: ["master", "develop"]
    tags: ["v*"]
    paths:
      - "gossip-writer/**"
      - "dtt-fork/**"
      - "docker/Dockerfile.gossip-writer"
      - ".github/workflows/ci-gossip-writer.yml"
  pull_request:
    branches: ["master", "develop"]
    paths:
      - "gossip-writer/**"
      - "dtt-fork/**"
      - "docker/Dockerfile.gossip-writer"
      - ".github/workflows/ci-gossip-writer.yml"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/gossip-writer

jobs:
  prepare:
    name: Determine Version Context
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.get_version.outputs.VERSION }}
      is_release: ${{ steps.get_version.outputs.IS_RELEASE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract Version
        id: get_version
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/master" ]]; then
            PARSED_VERSION=$(grep '^version' gossip-writer/Cargo.toml | head -1 | cut -d '"' -f 2)
            echo "VERSION=v${PARSED_VERSION}" >> $GITHUB_OUTPUT
            echo "IS_RELEASE=true" >> $GITHUB_OUTPUT
            echo "Building master. Extracted version: v${PARSED_VERSION}"

          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "VERSION=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "IS_RELEASE=true" >> $GITHUB_OUTPUT
            echo "Building from tag: ${{ github.ref_name }}"

          else
            echo "VERSION=dev-${{ github.sha }}" >> $GITHUB_OUTPUT
            echo "IS_RELEASE=false" >> $GITHUB_OUTPUT
            echo "Development build."
          fi

  build-and-push-image:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ needs.prepare.outputs.app_version }},enable=${{ needs.prepare.outputs.is_release == 'true' }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.gossip-writer
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
